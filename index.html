<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Monkey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Digital Monkey</h1>

   <div id="monkey-box">
  <img id="monkey-art" src="monkey-neutral.png" alt="Monkey">
</div>
 

    <div id="stats">
        <p>Hunger: <span id="hunger">5</span>/10</p>
        <p>Energy: <span id="energy">5</span>/10</p>
        <p>Mood: <span id="mood">5</span>/10</p>
    </div>

    <div id="buttons">
        <button onclick="feed()">Feed</button>
        <button onclick="play()">Play</button>
        <button onclick="rest()">Rest</button>
    </div>

    <p id="message"></p>

    <script src="script.js"></script>
</body>
</html>
